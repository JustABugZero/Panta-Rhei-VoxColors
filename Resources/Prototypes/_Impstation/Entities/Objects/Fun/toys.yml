- type: entity
  parent: BasePlushie
  id: PlushieThaven
  name: thaven plushie
  description: It is rude to not give this plushie hugs and kisses.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Fun/toys.rsi
    state: plushie_thaven

- type: entity
  parent: BasePlushie
  id: PlushieRaptor
  name: allulalo plushie
  description: chirp!
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Fun/toys.rsi
    state: plushie_raptor
  - type: Item
    inhandVisuals:
      left:
        - state: plushie_raptor-inhand-left
      right:
        - state: plushie_raptor-inhand-right
  - type: Clothing
    quickEquip: false
    sprite: _Impstation/Objects/Fun/toys.rsi
    equippedPrefix: raptor
    slots:
    - HEAD
    clothingVisuals:
      head:
      - state: raptor-equipped-HELMET
        offset: "0, 0.06"
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Impstation/Allulalo/allulalo_say.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Impstation/Allulalo/allulalo_chitter.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/_Impstation/Allulalo/allulalo_scream.ogg
